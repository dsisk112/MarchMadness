<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 NCAA Tournament Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <div>
        <h1>2026 NCAA Tournament Bracket</h1>
        <p class="subtitle">Browse each round, see AI projections, and highlight predicted winners.</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="button" id="refreshButton">Refresh predictions</button>
        <button class="button button--scores" id="scoresButton">Update Scores</button>
      </div>
    </header>

    <div id="status" class="status"></div>

    <nav class="tabs" id="roundTabs"></nav>
    <section id="roundContent"></section>
  </main>

  <script>
    const apiBase = 'http://127.0.0.1:5000';
    let bracketData = null;
    let scoreData = null;  // team_id -> {score, winner, completed, ...}
    let activeRoundIndex = 0;

    const $status = document.getElementById('status');
    const $tabs = document.getElementById('roundTabs');
    const $roundContent = document.getElementById('roundContent');
    const $refresh = document.getElementById('refreshButton');
    const $scores = document.getElementById('scoresButton');

    function setStatus(text, isError = false) {
      $status.textContent = text;
      $status.className = isError ? 'status error' : 'status';
    }

    async function loadBracket(refresh = false) {
      setStatus(refresh ? 'Refreshing from APIs...' : 'Loading bracket from cache...');
      try {
        const refreshParam = refresh ? '&refresh=true' : '';
        const response = await fetch(
          `${apiBase}/api/bracket?season=2026&start=2026-03-16&end=2026-03-20${refreshParam}&t=${Date.now()}`,
          { cache: 'no-store' }
        );
        const data = await response.json();
        if (data.error) {
          setStatus(`Error: ${data.error}`, true);
          return;
        }

        bracketData = data;
        activeRoundIndex = 0;
        renderTabs();
        renderActiveRound();
        setStatus('Bracket loaded. Select a round to view matchups.');
      } catch (err) {
        setStatus(`Error loading bracket: ${err.message}`, true);
        console.error(err);
      }
    }

    function renderTabs() {
      if (!bracketData?.rounds) return;
      $tabs.innerHTML = '';

      bracketData.rounds.forEach((round, idx) => {
        const btn = document.createElement('button');
        btn.className = `tab ${idx === activeRoundIndex ? 'active' : ''}`;
        btn.textContent = round.name;
        btn.onclick = () => {
          activeRoundIndex = idx;
          renderTabs();
          renderActiveRound();
        };
        $tabs.appendChild(btn);
      });
    }

    async function loadScores() {
      setStatus('Fetching live scores...');
      $scores.disabled = true;
      $scores.textContent = 'Updating...';
      try {
        const response = await fetch(
          `${apiBase}/api/scores?season=2026&start=2026-03-16&end=2026-03-20&t=${Date.now()}`,
          { cache: 'no-store' }
        );
        const data = await response.json();
        if (data.error) {
          setStatus(`Score error: ${data.error}`, true);
          return;
        }
        scoreData = data.games || [];
        renderActiveRound();
        const completed = scoreData.filter(g => g.completed).length;
        setStatus(`Scores updated. ${completed} game(s) final.`);
      } catch (err) {
        setStatus(`Error fetching scores: ${err.message}`, true);
      } finally {
        $scores.disabled = false;
        $scores.textContent = 'Update Scores';
      }
    }

    function formatTeamCell(team) {
      if (!team) return 'TBD';
      const seed = team.seed ? `<span class="badge badge--seed">${team.seed}</span>` : '';
      const name = team.name || 'TBD';
      return `${seed} ${name}`;
    }

    function formatKeyDrivers(metrics) {
      if (!metrics?.keyDrivers || !metrics.keyDrivers.length) return '<span class="badge badge--prob">No details</span>';
      // Filter out injury drivers — those are shown in the Injuries column now
      const filtered = metrics.keyDrivers.filter(d => !d.toLowerCase().includes('injury edge'));
      if (!filtered.length) return '<span class="badge badge--prob">Seed-based</span>';
      return filtered.slice(0, 3).map(driver => `<div class="badge badge--prob">${driver}</div>`).join('');
    }

    function formatWinProb(matchup) {
      const prob = matchup.metrics?.winProbability;
      if (prob == null) return '—';
      const pct = Math.round(prob * 100);
      const winner = matchup.predictedWinner?.name || '?';
      return `<span class="win-pct">${pct}%</span>`;
    }
    function formatScoreCell(matchup) {
      if (!scoreData || !scoreData.length) return '<span class="score-none">\u2014</span>';
      const aId = String(matchup.teamA?.id || '');
      const bId = String(matchup.teamB?.id || '');
      if (!aId || !bId) return '<span class="score-none">\u2014</span>';

      // Find the game where both teams from this matchup appear
      const game = scoreData.find(g => g.teams[aId] && g.teams[bId]);
      if (!game) return '<span class="score-none">\u2014</span>';

      const aInfo = game.teams[aId];
      const bInfo = game.teams[bId];
      const aVal = aInfo.score ?? '\u2014';
      const bVal = bInfo.score ?? '\u2014';
      const completed = game.completed;
      const state = game.gameState || 'pre';
      const detail = game.detail || '';

      const aWon = completed && aInfo.winner === true;
      const bWon = completed && bInfo.winner === true;
      const aName = matchup.teamA?.name || '?';
      const bName = matchup.teamB?.name || '?';

      let stateLabel, stateCls;
      if (completed) {
        stateLabel = 'Final';
        stateCls = 'score-final';
      } else if (state === 'in') {
        stateLabel = detail || 'Live';
        stateCls = 'score-live';
      } else {
        stateLabel = detail || 'Scheduled';
        stateCls = 'score-pre';
      }

      return `<div class="score-box ${stateCls}">`
        + `<span class="score-line ${aWon ? 'score-winner' : ''}">${aName} <strong>${aVal}</strong></span>`
        + `<span class="score-line ${bWon ? 'score-winner' : ''}">${bName} <strong>${bVal}</strong></span>`
        + `<span class="score-state">${stateLabel}</span>`
        + `</div>`;
    }
    function formatInjuryCell(matchup) {
      const metrics = matchup.metrics || {};
      const a = metrics.injuriesTeamA;
      const b = metrics.injuriesTeamB;
      const teamAName = matchup.teamA?.name || 'Team A';
      const teamBName = matchup.teamB?.name || 'Team B';

      if (!a?.players?.length && !b?.players?.length) {
        return '<span class="badge badge--impact-none">Healthy</span>';
      }

      // Compare raw injury impact to determine who is healthier
      const aImpact = a?.total_impact || 0;
      const bImpact = b?.total_impact || 0;
      const diff = Math.abs(aImpact - bImpact);
      const adj = metrics.injuryAdjustment || 0;
      const adjAbs = Math.abs(adj);

      let impactLabel, impactCls;
      if (adjAbs < 0.01) {
        impactLabel = 'No impact';
        impactCls = 'badge--impact-none';
      } else if (adjAbs < 0.04) {
        impactLabel = 'Little impact';
        impactCls = 'badge--impact-low';
      } else {
        impactLabel = 'Large impact';
        impactCls = 'badge--impact-high';
      }

      let edgeLabel;
      if (diff < 1.0) {
        edgeLabel = 'Even';
      } else if (aImpact < bImpact) {
        // Team A is healthier (less injury impact)
        edgeLabel = `${teamAName} edge`;
      } else {
        // Team B is healthier
        edgeLabel = `${teamBName} edge`;
      }

      // Build tooltip content
      let tooltip = '';
      if (a?.players?.length) {
        tooltip += `${a.team} (${aImpact.toFixed(1)} impact):\n`;
        a.players.forEach(p => {
          tooltip += `  ${p.player} — ${p.status} (${p.injury}), ${p.ppg} PPG/${p.rpg} RPG/${p.apg} APG\n`;
        });
      }
      if (b?.players?.length) {
        if (tooltip) tooltip += '\n';
        tooltip += `${b.team} (${bImpact.toFixed(1)} impact):\n`;
        b.players.forEach(p => {
          tooltip += `  ${p.player} — ${p.status} (${p.injury}), ${p.ppg} PPG/${p.rpg} RPG/${p.apg} APG\n`;
        });
      }
      tooltip += `\nWin % adjustment: ${adj > 0 ? '+' : ''}${(adj * 100).toFixed(1)}%`;
      tooltip += `\nImpact tier: ${impactLabel}`;

      return `<span class="badge ${impactCls} injury-hover" title="${tooltip.replace(/"/g, '&quot;')}">${edgeLabel}</span>`;
    }

    const SIGNAL_DEFS = {
      1: { label: 'Road', keyword: 'travels better', color: '#60c9ff' },
      2: { label: 'Margin', keyword: 'thin per-game margin', color: '#f5c542' },
      3: { label: 'Top-heavy', keyword: 'top-heavy', color: '#ff8a8a' },
      4: { label: '3PT', keyword: '3PT upset', color: '#7be0a8' },
      5: { label: 'Turnovers', keyword: 'sloppier', color: '#c9a0ff' },
    };

    function formatUpsetCell(matchup) {
      const mx = matchup.metrics || {};
      const ur = (typeof mx.upsetRisk === 'object' && mx.upsetRisk) || {};
      const signals = ur.signals || [];
      const score = ur.score || 0;

      if (!signals.length && score <= 20) {
        return '<span class="signal-quiet">—</span>';
      }

      // Map each signal string to its number
      const circles = [];
      signals.forEach(sig => {
        for (const [num, def] of Object.entries(SIGNAL_DEFS)) {
          if (sig.toLowerCase().includes(def.keyword)) {
            const tip = `Signal ${num} (${def.label}): ${sig}`;
            circles.push(
              `<span class="signal-dot" style="border-color:${def.color};color:${def.color}" title="${tip.replace(/"/g, '&quot;')}">${num}</span>`
            );
            break;
          }
        }
      });

      // Show risk score badge if >= 25
      let scoreBadge = '';
      if (score >= 25) {
        const cls = score >= 40 ? 'risk-high' : 'risk-med';
        scoreBadge = `<span class="signal-score ${cls}" title="Upset Risk Score: ${score}/100">${score}</span>`;
      }

      return (circles.length ? circles.join('') : '') + scoreBadge || '<span class="signal-quiet">—</span>';
    }

    function renderActiveRound() {
      if (!bracketData?.rounds?.length) {
        $roundContent.innerHTML = '<p>No bracket data available.</p>';
        return;
      }

      const round = bracketData.rounds[activeRoundIndex];
      if (!round?.matchups?.length) {
        $roundContent.innerHTML = '<p>No matchups for this round.</p>';
        return;
      }

      const regionOrder = ['East', 'South', 'West', 'Midwest', 'First Four', 'Tournament'];
      const grouped = new Map();

      round.matchups.forEach(matchup => {
        const region = matchup.region || 'Tournament';
        if (!grouped.has(region)) grouped.set(region, []);
        grouped.get(region).push(matchup);
      });

      const sortedRegions = Array.from(grouped.keys()).sort((a, b) => {
        const aIdx = regionOrder.indexOf(a);
        const bIdx = regionOrder.indexOf(b);
        const aRank = aIdx === -1 ? 999 : aIdx;
        const bRank = bIdx === -1 ? 999 : bIdx;
        if (aRank !== bRank) return aRank - bRank;
        return a.localeCompare(b);
      });

      const renderRows = (matchups) => matchups.map(matchup => {
        const winner = matchup.predictedWinner || {};
        const aIsWinner = (winner.name && winner.name === matchup.teamA?.name)
                       || (winner.id && winner.id === matchup.teamA?.id);
        const bIsWinner = (winner.name && winner.name === matchup.teamB?.name)
                       || (winner.id && winner.id === matchup.teamB?.id);
        const details = formatKeyDrivers(matchup.metrics);
        const winProb = formatWinProb(matchup);
        const upset = formatUpsetCell(matchup);
        const injuries = formatInjuryCell(matchup);
        const score = formatScoreCell(matchup);

        return `
          <tr>
            <td class="${aIsWinner ? 'winner' : ''}">${formatTeamCell(matchup.teamA)}</td>
            <td class="${bIsWinner ? 'winner' : ''}">${formatTeamCell(matchup.teamB)}</td>
            <td class="col-score">${score}</td>
            <td class="col-prob">${winProb}</td>
            <td class="col-upset">${upset}</td>
            <td class="col-injury">${injuries}</td>
            <td>${details}</td>
          </tr>
        `;
      }).join('');

      const regionSections = sortedRegions.map(region => {
        const rows = renderRows(grouped.get(region));
        return `
          <div class="table-container">
            <h2>${region}</h2>
            <table>
              <thead>
                <tr>
                  <th>Team A</th>
                  <th>Team B</th>
                  <th>Score</th>
                  <th>Win %</th>
                  <th>Signals</th>
                  <th>Injuries</th>
                  <th>Prediction Reason</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        `;
      }).join('');

      $roundContent.innerHTML = `
        <div class="table-container">
          <h2>${round.name}</h2>
        </div>
        ${regionSections}
      `;
    }

    $refresh.addEventListener('click', () => loadBracket(true));
    $scores.addEventListener('click', () => loadScores());

    loadBracket();
  </script>
</body>
</html>
